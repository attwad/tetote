{% extends "base.html" %}
{% load i18n wagtailcore_tags %}

{% block title %}{{ page.title }} - Tetote{% endblock %}

{% block content %}
    <div class="max-w-[800px] mx-auto">
        <article>
            <h1 class="mb-2">{{ page.title }}</h1>
            <p class="text-brand-muted text-sm mb-8">{{ page.created_at|date:"F j, Y" }}</p>
            <div class="prose prose-brand max-w-none">
                {{ page.paragraph|richtext }}
            </div>
        </article>

        <div class="mt-12 pt-8 border-t border-brand-border">
            <a href="{% url 'news_list' %}" class="text-brand-accent hover:underline">
                &larr; {% translate "Back to news" %}
            </a>
        </div>
    </div>
{% endblock %}
